name: Medium Clone Project CI/CD

on:
  workflow_dispatch:
    inputs:
      tests_path:
        description: 'Tests path'
        required: false
        default: ''
      github_feedback_id:
        description: 'Github feedback id'
        required: true

jobs:
  deploy:
    name: Deploy and run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Clean environment
        run: |
          rm -rf original-repo
          rm -rf forked-repo

      - name: Send started signal
        run: |
          echo "api ${{ secrets.API_BASE_URL }}"
          echo "x api ${{ secrets.X_API_KEY }}"
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=started"

      - name: Checkout original repository
        uses: actions/checkout@v4
        with:
          repository: Mohirdevelopers/medium-clone-backend-initial
          path: original-repo
          ref: main
          fetch-depth: 0

      - name: Checkout forked repository
        uses: actions/checkout@v4
        with:
          path: forked-repo
          ref: main
          fetch-depth: 0

      - name: Inject tests from original repo
        run: |
          rm -rf forked-repo/tests
          mv original-repo/tests forked-repo/
          rm -rf original-repo

      - name: Create .env file
        working-directory: forked-repo
        run: cp .env.example .env

      - name: Build and start application
        working-directory: forked-repo
        run: |
          docker compose up -d --build
          sleep 10s
          docker ps -a
          docker logs medium_app || true

      - name: Check application health
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:8000/health/; then
              echo "Healthy"; break
            fi
            sleep 3
          done

      - name: Run tests
        working-directory: forked-repo
        run: |
          mkdir -p reports
          docker compose exec -T medium_app pytest ${{ github.event.inputs.tests_path }} \
            --cache-clear -vv \
            --json-report \
            --json-report-file=./reports/unittest-checker-report.json \
            --json-report-indent=2
        continue-on-error: true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unittest-checker-artifact
          path: forked-repo/reports/unittest-checker-report.json
          retention-days: 30

      - name: Send finished signal
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=$STATUS"
