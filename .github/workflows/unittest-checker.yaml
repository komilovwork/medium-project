name: Medium Clone Project CI/CD

on:
  workflow_dispatch:
    inputs:
      tests_path:
        description: 'Tests path'
        required: false
        default: ''
      github_feedback_id:
        description: 'Github feedback id'
        required: true
      fork_owner:
        description: 'Fork repository owner'
        required: true
      fork_repo:
        description: 'Fork repository name'
        required: true
      source_owner:
        description: 'Source repository owner'
        required: true
      source_repo:
        description: 'Source repository name'
        required: true

jobs:
  deploy:
    name: Deploy and run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Clean environment
        run: |
          rm -rf original-repo forked-repo

      - name: Send started signal
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=started" \
            --form "step=started"

      - name: Notify checkout original repository
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=step" \
            --form "step=Checking original repository"

      - name: Checkout original repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_owner }}/${{ github.event.inputs.source_repo }}
          token: ${{ secrets.STUDENT_GITHUB_TOKEN }}
          path: original-repo
          ref: main
          fetch-depth: 0

      - name: Notify checkout forked repository
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=step" \
            --form "step=Checking forked repository"

      - name: Checkout forked repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.fork_owner }}/${{ github.event.inputs.fork_repo }}
          token: ${{ secrets.STUDENT_GITHUB_TOKEN }}
          path: forked-repo
          ref: main
          fetch-depth: 0

      - name: Notify building application
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=step" \
            --form "step=Building application"

      - name: Inject tests and build
        working-directory: forked-repo
        run: |
          rm -rf tests
          mv ../original-repo/tests .
          rm -rf ../original-repo
          cp .env.example .env
          docker compose up -d --build
          sleep 10s

      - name: Check application health
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=step" \
            --form "step=Checking application health"
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:8000/health/; then
              echo "Healthy"; break
            fi
            sleep 3
          done

      - name: Notify running tests
        run: |
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=step" \
            --form "step=Running tests"

      - name: Run tests
        working-directory: forked-repo
        run: |
          mkdir -p reports
          docker compose exec -T medium_app pytest ${{ github.event.inputs.tests_path }} \
            --cache-clear -vv \
            --json-report \
            --json-report-file=./reports/unittest-checker-report.json \
            --json-report-indent=2
        continue-on-error: true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unittest-checker-artifact
          path: forked-repo/reports/unittest-checker-report.json
          retention-days: 30

      - name: Send finished signal
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi
          curl -sf -X PUT "${{ secrets.API_BASE_URL }}/github/feedbacks/${{ github.event.inputs.github_feedback_id }}/" \
            --header "X-API-KEY: ${{ secrets.X_API_KEY }}" \
            --form "github_username=${{ github.actor }}" \
            --form "action_run_id=${{ github.run_id }}" \
            --form "status=$STATUS" \
            --form "step=$STATUS"
